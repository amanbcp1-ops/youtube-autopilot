name: YouTube Auto-Publisher

on:
  schedule:
    - cron: '0 9 */3 * *'   # Runs every 3 days at 9am UTC
  workflow_dispatch:          # Also lets you trigger it manually anytime

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install \
            google-generativeai \
            edge-tts \
            moviepy \
            Pillow \
            google-api-python-client \
            google-auth-oauthlib \
            requests

      - name: Load YouTube token
        run: echo '${{ secrets.YOUTUBE_TOKEN }}' > token.json

      - name: Run the automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python main.py
